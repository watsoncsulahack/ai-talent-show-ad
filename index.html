<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Talent Show - Open Call</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="stage">
    <header class="topbar">
      <p class="kicker">OPEN CALL • AI TALENT SHOW</p>
      <h1>HUMANS + AI + ROBOTS</h1>
      <p class="sub">Livestream performances, judged by people, audience, and machines.</p>
    </header>

    <section class="artboard" aria-label="Animated geometric poster art">
      <div class="spiral s1"></div>
      <div class="spiral s2"></div>
      <div class="spiral s3"></div>
      <div class="spiral s4"></div>
      <div class="spiral s5"></div>

      <div class="tri tri-outer"></div>
      <div class="tri tri-mid"></div>
      <div class="tri tri-inner"></div>
      <div class="a-stroke a-left"></div>
      <div class="a-stroke a-right"></div>
      <div class="a-stroke a-cross"></div>

      <div class="zig zig-left"></div>
      <div class="zig zig-right"></div>

      <div class="circle circle-big"></div>
      <div class="circle circle-inner"></div>

      <div class="vline v1"></div>
      <div class="vline v2"></div>
      <div class="hline h1"></div>
      <div class="hline h2"></div>
    </section>

    <section class="details">
      <div>
        <h2>Categories</h2>
        <p>Livestream • Appearance • Proof of Human</p>
      </div>
      <div>
        <h2>Join Us</h2>
        <p>Performers, programmers, artists, judges, sponsors.</p>
      </div>
    </section>
  </main>

  <div class="robot-layer" aria-hidden="true">
    <div class="robot-trail"></div>
    <div class="flying-robot">
      <div class="prop"></div>
      <div class="mast"></div>
      <div class="bot-body">
        <div class="eye e1"></div>
        <div class="eye e2"></div>
        <div class="grill"></div>
      </div>
    </div>
  </div>

  <script src="script.js?v=4"></script>
</body>
</html>
